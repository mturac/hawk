version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - '4000:4000'
    environment:
      - HAWK_PORT=4000
      - HAWK_DB_PATH=/data/hawk.db
      - HAWK_WEB_URL=http://localhost:3000
      - HAWK_BASE_URL=http://localhost:4000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_APP_TOKEN=${GITHUB_APP_TOKEN}
      - HAWK_DEFAULT_PROVIDER=${HAWK_DEFAULT_PROVIDER:-openai}
      - HAWK_DEFAULT_MODEL=${HAWK_DEFAULT_MODEL:-gpt-4o}
    volumes:
      - hawk-data:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  hawk-data:
